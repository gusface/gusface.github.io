<!DOCTYPE html>
<html>
<head>
  <title>Complex Webpage with Background Video</title>
  <style>
    /* Reset some default styles */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* Page container */
    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Video styles */
    video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -1;
    }

    /* Content styles */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 4px;
      text-align: center;
    }

    /* Heading styles */
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    /* Button styles */
    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #3498db;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #2980b9;
    }
  </style>
  <script>
    // JavaScript for interactive features
    function showMessage() {
      alert('Hello! This is an interactive feature.');
      window.location.href = 'about.html'; // Open hyperlink to about.html
    }
  </script>
</head>
<body>
  <div class="container">
    <video src="background-video.mp4" autoplay=1 muted loop></video>
    <div class="content">
      <h1>Welcome to the Complex Webpage</h1>
      <p>Click the button below to see an interactive feature:</p>
      <button class="button" onclick="showMessage()">Click Me!</button>
    </div>
  </div>
</body>
</html>
