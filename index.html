<!DOCTYPE html>
<html>
<head>
  <title>Complex Webpage with Picture Background</title>
  <style>
    /* Reset some default styles */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* Page container */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      background-image: url('background-image.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      position: relative;
      z-index: 0;
    }

    /* Content styles */
    .content {
      background-color: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 4px;
      position: relative;
      z-index: 1;
    }

    /* Heading styles */
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    /* Button styles */
    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #3498db;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #2980b9;
    }
  </style>
  <script>
    // JavaScript for interactive features
    function showMessage() {
      alert('Hello! This is an interactive feature.');
      window.location.href = 'https://gusface.github.io/About.html'; // Open hyperlink to about.html
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1>Welcome to the Complex Webpage</h1>
      <p>Click the button below to see an interactive feature:</p>
      <button class="button" onclick="showMessage()">Click Me!</button>
    </div>
  </div>
</body>
</html>
